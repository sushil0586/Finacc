<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Purchase Invoice - Charge Lines (Sample)</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d8deea;
      --text: #1e2a3a;
      --muted: #5d6b82;
      --brand: #0c6cf2;
      --danger: #cc3344;
    }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(135deg, #f6f9ff, #eef3fb);
      color: var(--text);
    }
    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(18, 39, 72, 0.08);
      overflow: hidden;
    }
    .head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfdff;
    }
    .head h2 {
      margin: 0;
      font-size: 18px;
    }
    .head p {
      margin: 6px 0 0;
      font-size: 13px;
      color: var(--muted);
    }
    .body {
      padding: 16px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 960px;
    }
    th, td {
      border: 1px solid var(--line);
      padding: 8px;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      background: #f3f7ff;
      text-align: left;
      font-weight: 600;
    }
    input, select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c7d2e5;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      background: #fff;
    }
    .num { text-align: right; }
    .actions {
      display: flex;
      gap: 10px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-light { background: #e8efff; color: #12408f; }
    .btn-danger { background: #ffe8ec; color: var(--danger); }
    .footer {
      border-top: 1px solid var(--line);
      padding: 14px 16px;
      background: #fbfdff;
      font-size: 13px;
      color: var(--muted);
    }
    pre {
      margin: 8px 0 0;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #d4dff2;
      background: #f4f8ff;
      max-height: 220px;
      overflow: auto;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="head">
      <h2>Charge Lines</h2>
      <p>Use this section in Purchase Invoice Create/Edit. Totals should always come from backend response.</p>
    </div>
    <div class="body">
      <table id="charge-table">
        <thead>
          <tr>
            <th style="width: 160px;">Charge Type</th>
            <th style="width: 140px;">Basis</th>
            <th style="width: 130px;">Calc Type</th>
            <th style="width: 110px;">Rate %</th>
            <th style="width: 130px;">Base Amount</th>
            <th style="width: 130px;">Amount</th>
            <th style="width: 120px;">Taxability</th>
            <th style="width: 95px;">GST %</th>
            <th style="width: 120px;">Apply TDS</th>
            <th style="width: 70px;">Action</th>
          </tr>
        </thead>
        <tbody id="charge-body"></tbody>
      </table>
    </div>
    <div class="actions">
      <button class="btn-light" type="button" id="add-line">Add Charge Line</button>
      <button class="btn-primary" type="button" id="show-payload">Preview Payload</button>
    </div>
    <div class="footer">
      JSON payload preview (send as <code>charge_lines</code> in purchase invoice API):
      <pre id="payload-preview">[]</pre>
    </div>
  </div>

  <template id="row-template">
    <tr>
      <td>
        <select data-key="charge_type_id" required>
          <option value="">Select</option>
          <option value="1">Freight</option>
          <option value="2">Packing</option>
          <option value="3">Insurance</option>
        </select>
      </td>
      <td>
        <select data-key="basis">
          <option value="INVOICE_VALUE">Invoice Value</option>
          <option value="LINE_VALUE">Line Value</option>
          <option value="QUANTITY">Quantity</option>
          <option value="FIXED">Fixed</option>
        </select>
      </td>
      <td>
        <select data-key="calculation_type">
          <option value="PERCENT">Percent</option>
          <option value="FIXED">Fixed</option>
        </select>
      </td>
      <td><input data-key="rate" class="num" type="number" step="0.01" value="0"></td>
      <td><input data-key="base_amount" class="num" type="number" step="0.01" value="0"></td>
      <td><input data-key="amount" class="num" type="number" step="0.01" value="0"></td>
      <td>
        <select data-key="taxability">
          <option value="TAXABLE">Taxable</option>
          <option value="EXEMPT">Exempt</option>
          <option value="NON_GST">Non-GST</option>
        </select>
      </td>
      <td><input data-key="gst_rate" class="num" type="number" step="0.01" value="0"></td>
      <td>
        <select data-key="apply_tds">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </td>
      <td><button class="btn-danger js-remove" type="button">Remove</button></td>
    </tr>
  </template>

  <script>
    const body = document.getElementById("charge-body");
    const tpl = document.getElementById("row-template");
    const out = document.getElementById("payload-preview");

    function addRow() {
      body.appendChild(tpl.content.firstElementChild.cloneNode(true));
    }

    function getPayload() {
      return [...body.querySelectorAll("tr")].map((row) => {
        const obj = {};
        row.querySelectorAll("[data-key]").forEach((el) => {
          const key = el.getAttribute("data-key");
          let val = el.value;
          if (["rate", "base_amount", "amount", "gst_rate"].includes(key)) {
            val = Number(val || 0);
          } else if (key === "apply_tds") {
            val = val === "true";
          } else if (key === "charge_type_id") {
            val = val ? Number(val) : null;
          }
          obj[key] = val;
        });
        return obj;
      });
    }

    document.getElementById("add-line").addEventListener("click", addRow);
    document.getElementById("show-payload").addEventListener("click", () => {
      out.textContent = JSON.stringify(getPayload(), null, 2);
    });
    body.addEventListener("click", (e) => {
      if (e.target.classList.contains("js-remove")) {
        e.target.closest("tr").remove();
      }
    });

    addRow();
  </script>
</body>
</html>
